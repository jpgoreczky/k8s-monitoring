apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  groups:
  - name: service-degradation
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Pod has restarted more than 3 times in 15 minutes"

    - alert: FrequentContainerRestarts
      expr: kube_pod_container_status_restarts_total > 3
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.container }} has restarted frequently"

  - name: resource-exhaustion
    rules:
    - alert: ContainerHighMemoryUsage
      expr: |
        (container_memory_usage_bytes{container!=""} /
        container_spec_memory_limit_bytes{container!=""}) * 100 > 90
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.container }} memory above 90%"

    - alert: ContainerHighCPUUsage
      expr: |
        rate(container_cpu_usage_seconds_total{pod=~"backend.*"}[5m]) > 0.2
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Backend pod CPU usage is high"
        description: "Backend pod is using more than 80% of its 250m CPU limit"